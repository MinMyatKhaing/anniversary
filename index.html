<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Anniversary ❤️</title>

<style>

body{
background:#000;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:40px;
color:#ff4d6d;
}

.row{
margin:20px;
display:flex;
justify-content:center;
gap:25px;
}

.heart{
width:50px;
height:50px;
background:red;
display:inline-flex;
align-items:center;
justify-content:center;
color:white;
font-size:14px;
font-weight:bold;
position:relative;
transform:rotate(-45deg);
animation: heartbeat 1.5s infinite;
}

@keyframes heartbeat{
0%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.15);}
100%{transform:rotate(-45deg) scale(1);}
}

.heart:before,
.heart:after{
content:"";
width:50px;
height:50px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{
top:-25px;
left:0;
}

.heart:after{
left:25px;
top:0;
}

.number{
transform:rotate(45deg);
z-index:1;
font-size:14px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}
  
.flagBtn{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
transition:all 0.3s ease;
}

/* Hover effect */
.flagBtn:hover{
transform:scale(1.15);
background:#ff1e4d;
box-shadow:0 0 10px #ff4d6d;
}

/* Active selected button */
.flagBtn.active{
background:#00c3ff;
box-shadow:0 0 12px #00c3ff;
}

</style>
</head>

<body>

<h1>Our Love Anniversary ❤️</h1>

<!-- Row 1 -->
<div class="row">
<div class="heart"><div class="number" id="days">0</div></div>
<div class="heart"><div class="number" id="hours">0</div></div>
<div class="heart"><div class="number" id="minutes">0</div></div>
</div>

<!-- Row 2 -->
<div class="row">
<div class="heart"><div class="number" id="years">0</div></div>
<div class="heart"><div class="number" id="months">0</div></div>
<div class="heart"><div class="number" id="date">0</div></div>
</div>

<!-- Row 3 -->
<div class="row">
<button class="flagBtn active" onclick="setZone('Asia/Yangon',this)">🇲🇲 Myanmar</button>
<button class="flagBtn" onclick="setZone('Asia/Ho_Chi_Minh',this)">🇻🇳 Vietnam</button>
<button class="flagBtn" onclick="setZone('Asia/Tokyo',this)">🇯🇵 Japan</button>
</div>

<script>
let zone = "Asia/Ho_Chi_Minh"

/* Set your anniversary date here (Myanmar time) */
const anniversary = new Date(Date.UTC(2022,7,12,17,24,0))

function setZone(z,btn){

zone = z

/* highlight active button */
document.querySelectorAll(".flagBtn").forEach(b=>{
b.classList.remove("active")
})

btn.classList.add("active")

/* update timer immediately */
update()

}

function update(){

const now = new Date(new Date().toLocaleString("en-US",{timeZone:zone}))

const diff = now - anniversary

const minutes = Math.floor(diff/60000) % 60
const hours = Math.floor(diff/3600000) % 24
const days = Math.floor(diff/86400000)

document.getElementById("minutes").innerText = minutes
document.getElementById("hours").innerText = hours
document.getElementById("days").innerText = days


/* Anniversary Y M D calculation */

let y = now.getFullYear() - anniversary.getFullYear()
let m = now.getMonth() - anniversary.getMonth()
let d = now.getDate() - anniversary.getDate()

if(d < 0){

    m--

    // get correct days in previous month
    const prevMonthDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate()

    d += prevMonthDays
}

if(m < 0){
    y--
    m += 12
}

document.getElementById("years").innerText = y
document.getElementById("months").innerText = m
document.getElementById("date").innerText = d

}

setInterval(update,1000)
</script>

</body>
</html>
