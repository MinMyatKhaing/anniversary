<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Anniversary ❤️</title>

<style>

body{
background:#000;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:40px;
color:#ff4d6d;
}

.row{
margin:20px;
}

.heart{
width:50px;
height:50px;
background:red;
display:inline-flex;
align-items:center;
justify-content:center;
margin:8px;
color:white;
font-size:14px;
font-weight:bold;
position:relative;
transform:rotate(-45deg);
}

.heart:before,
.heart:after{
content:"";
width:50px;
height:50px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{
top:-25px;
left:0;
}

.heart:after{
left:25px;
top:0;
}

.number{
transform:rotate(45deg);
z-index:1;
font-size:14px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Our Love Anniversary ❤️</h1>

<!-- Row 1 -->
<div class="row">
<div class="heart"><div class="number" id="days">0</div></div>
<div class="heart"><div class="number" id="hours">0</div></div>
<div class="heart"><div class="number" id="minutes">0</div></div>
</div>

<!-- Row 2 -->
<div class="row">
<div class="heart"><div class="number" id="years">0</div></div>
<div class="heart"><div class="number" id="months">0</div></div>
<div class="heart"><div class="number" id="date">0</div></div>
</div>

<!-- Row 3 -->
<div class="row">
<button onclick="setZone('Asia/Yangon')">🇲🇲 Myanmar</button>
<button onclick="setZone('Asia/Ho_Chi_Minh')">🇻🇳 Vietnam</button>
<button onclick="setZone('Asia/Tokyo')">🇯🇵 Japan</button>
</div>

<script>

let zone = "Asia/Ho_Chi_Minh"

/* Set your anniversary date here */
const anniversary = new Date("2022-08-13T00:24:00")

function setZone(z){
zone = z
}

function update(){

const now = new Date(new Date().toLocaleString("en-US",{timeZone:zone}))

const diff = now - anniversary

const minutes = Math.floor(diff/60000)%60
const hours = Math.floor(diff/3600000)%24
const days = Math.floor(diff/86400000)

document.getElementById("minutes").innerText = minutes
document.getElementById("hours").innerText = hours
document.getElementById("days").innerText = days

let y = now.getFullYear()-anniversary.getFullYear()
let m = now.getMonth()-anniversary.getMonth()
let d = now.getDate()-anniversary.getDate()

if(d < 0){
m--
d += 30
}

if(m < 0){
y--
m += 12
}

document.getElementById("years").innerText = y
document.getElementById("months").innerText = m
document.getElementById("date").innerText = d

}

setInterval(update,1000)

</script>

</body>
</html>
